name: Release verified runtime asset

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-runtime-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils ripgrep
          python -m pip install pytest jsonschema

      - name: Verify package and public safety
        run: |
          bash scripts/verify-package.sh
          bash scripts/public_safety_check.sh

      - name: Verify Agent Workforce Ontology release gate
        run: >-
          python -m pytest -q
          tests/test_workforce_ontology.py
          tests/test_workforce_benchmark.py

      - name: Verify updater and credential gates
        run: |
          python -m pytest -q \
            tests/test_runtime_update.py \
            tests/test_public_safety_check.py \
            tests/test_release_runtime_assets.py \
            tests/test_workforce_workflow_gates.py

      - name: Build deterministic runtime archive
        run: bash scripts/build-runtime-release-asset.sh "$GITHUB_REF_NAME"

      - name: Publish release with verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          archive="dist/runtime-release/hephaestus-runtime-${GITHUB_REF_NAME}.tar.gz"
          checksum="${archive}.sha256"
          bash scripts/publish-runtime-release-assets.sh "$GITHUB_REF_NAME" "$archive" "$checksum"
