description = "Build, repair, or package Agentlas agents and teams with Hephaestus."
prompt = """
Update fallback: 자동 업데이트가 안 되면 `hephaestus update`를 한 번 실행하세요. 업데이트하지 않아도 현재 버전 명령은 그대로 동작합니다.

# /hep-build


Raw arguments:
{{args}}

Use Hephaestus as the Agentlas builder surface. This is the clearer
public build surface next to hep-network and hep-cloud.

If this workspace contains `AGENTS.md`, `.agentlas/mode-map.json`, and
`.agentlas/global-commands.json`, read those files first and follow the local
package contract.

If this workspace does not contain the Hephaestus package files yet, explain
that the user should run the one-touch installer from an OS terminal:

`curl -fsSL https://raw.githubusercontent.com/agentlas-ai/Agentlas-OS/main/scripts/install-all-runtimes.sh | bash`

For creation or behavior-changing packaging work, classify the request as
single-agent-builder, multi-agent-team-builder, or agentlas-packager by
independent ownership boundaries. If single↔multi is unclear, ask first in
plain language: "이 일을 한 명의 전문가가 처음부터 끝까지 맡으면 되나요, 아니면
조사/분석/검토처럼 여러 전문가가 나눠 맡고 마지막에 합쳐야 하나요?" Do not show
non-technical users internal labels like ownership boundary, memory/context,
synthesis, or produces/consumes. Then run
the Builder Interview and Research Gate from
`docs/builder-interview-research-gate.md` before writing substantial package
files. Ask an 8-12 question first batch when the request is vague, continue
follow-ups until the functional brief, role count, ownership boundaries, tool
permission separation, synthesis need, and execution order are clear, research
official sources, similar agent repositories or comparables,
academic/professional theory, and plugin docs, compare selected and rejected
tools/plugins, synthesize domain-expert behavior, and create
`docs/builder-interview.md`,
`docs/research-sources.md`, `docs/tool-selection.md`,
`docs/domain-expert-synthesis.md`, `docs/prompt-performance-contract.md`, and
`.agentlas/capability-eval-plan.json`.

Generate or repair the Agentlas package, run
`scripts/verify-team-package.sh <package-root>`, verify it, and include the
`global_commands` section from `.agentlas/global-commands.json` and
`interview_research` evidence in the final response.
If the shape gate fails, do not report `completed`; correct the package by
collapsing to a valid single-agent shape or adding orchestrator/HQ plus
company-blueprint topology, then rerun the gate.

If the first argument is `ontology`, open the project ontology GUI by running
`./bin/hephaestus ontology --gui .` when the local shell command is available,
then report `gui_url`, `db_path`, `inbox_path`, and verification status.

If a package was created or repaired in the current workspace, register it to local
discovery before final reporting:

`./bin/hephaestus cards migrate . --tier local --overwrite`

Include the migration result in `interview_research`.
"""
